type User @table {
  email: String!
  displayName: String!
  avatarUrl: String
  bio: String
}

type Project @table {
  title: String!
  description: String
  createdAt: Timestamp
  owner: User!
}

type Task @table {
  title: String!
  status: String!
  description: String
  dueDate: Timestamp
  project: Project!
  assignedTo: User
}

type Comment @table {
  content: String!
  createdAt: Timestamp
  task: Task!
  author: User!
}

type ProjectMember @table(key: ["project", "user"]) {
  project: Project!
  user: User!
  role: String!
}