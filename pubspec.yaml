name: EasyRealtorsPro
description: Flutter Desktop Admin app (Windows) with first-run Drive setup and retention scheduler.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  url_launcher: ^6.3.0
  path_provider: ^2.1.3
  http: ^1.2.1
  shimmer: ^3.0.0
  sqlite3_flutter_libs: ^0.5.24
  drive_client:
    path: packages/drive_client
  shared:
    path: packages/shared
  pdf: ^3.10.8
  printing: ^5.12.0
  flutter_local_notifications: ^17.2.2
  syncfusion_flutter_pdf: ^24.2.9
  google_fonts: ^6.2.1
  image: ^4.2.0
  file_selector: ^1.0.3
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10
  system_tray: ^2.0.3
  window_manager: ^0.3.7
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.4
  firebase_auth: ^5.3.1
  googleapis_auth: ^1.6.0
  drift: ^2.20.0
  fl_chart: ^0.69.0
  jwt_decoder: ^2.0.1
  crypto: ^3.0.5
  random_string: ^2.3.1
  share_plus: ^7.2.1

dev_dependencies:
  build_runner: ^2.4.12
  drift_dev: ^2.20.0

flutter:
  uses-material-design: true
  assets:
    - assets/app_icon.ico
    - assets/fonts/
  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
